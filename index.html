<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;overflow-x:hidden;}

#app{
  width:100vw;
  max-width:100%;
  background:#0a0a0a;
  display:flex;
  flex-direction:column;
  min-height:100svh;
  font-family:sans-serif;
}

#topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 14px;
  background:#111;
  flex-shrink:0;
}
.tb-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#fff;}
.gps-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite;flex-shrink:0;}
.gps-dot.searching{background:#fbbf24;}
.gps-dot.error{background:#f87171;animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

#viewfinder{
  position:relative;
  width:100%;
  flex:1;
  min-height:0;
  background:#111;
  overflow:hidden;
}
#video{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}
#no-cam{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:#555;gap:10px;font-size:13px;text-align:center;padding:20px;
}
#no-cam i{font-size:48px;color:#2a2a2a;}
#grid-canvas{position:absolute;inset:0;pointer-events:none;display:none;}

#geo-bar{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:28px 12px 10px;
  background:linear-gradient(transparent,rgba(0,0,0,0.78) 50%);
}
.geo-coords{font-size:11px;font-family:monospace;color:#a3e635;letter-spacing:0.3px;}
.geo-addr{font-size:12px;color:#fff;margin-top:2px;line-height:1.35;}
.geo-ts{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}

#controls{
  background:#111;
  padding:10px 14px 12px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.mode-row{
  display:flex;gap:6px;justify-content:center;
}
.mode-btn{
  font-size:12px;color:#666;
  padding:5px 14px;border-radius:20px;
  cursor:pointer;border:0.5px solid transparent;
  background:none;transition:all 0.15s;
  min-height:34px;
}
.mode-btn.active{color:#fff;border-color:#444;background:#222;}

.ctrl-row{
  display:flex;
  align-items:center;
  justify-content:space-around;
}

.ic-btn{
  background:#1f1f1f;
  border:0.5px solid #333;
  border-radius:50%;
  width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#ccc;font-size:22px;
  flex-shrink:0;
  transition:background 0.12s;
}
.ic-btn:active{background:#333;transform:scale(0.93);}
.ic-btn.on{color:#fbbf24;border-color:#fbbf24;}
.ic-btn.cam-on{color:#4ade80;border-color:#4ade80;}

#shutter{
  width:76px;height:76px;
  border-radius:50%;
  background:#fff;
  border:none;
  outline:4px solid #444;
  cursor:pointer;
  flex-shrink:0;
  transition:transform 0.1s,background 0.1s;
}
#shutter:active{transform:scale(0.91);background:#ddd;}
#shutter.snap{background:#f87171;}
#shutter:disabled{background:#444;outline-color:#333;cursor:not-allowed;}

#statusbar{
  font-size:11px;color:#444;
  text-align:center;
  padding:4px 14px 6px;
  background:#0a0a0a;
  flex-shrink:0;
}

#preview-wrap{
  background:#0d0d0d;
  padding:12px 14px;
  flex-shrink:0;
  display:none;
  flex-direction:column;
  gap:10px;
}
#preview-wrap.show{display:flex;}

.prev-lbl{font-size:11px;color:#555;letter-spacing:0.5px;}

#prev-frame{
  position:relative;
  border-radius:10px;overflow:hidden;
  border:0.5px solid #222;
}
#prev-img{width:100%;display:block;}

#prev-stamp{
  position:absolute;bottom:0;left:0;right:0;
  padding:24px 10px 10px;
  background:linear-gradient(transparent,rgba(0,0,0,0.82) 50%);
}
.ps-brand{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.ps-coord{font-size:10px;color:#a3e635;font-family:monospace;}
.ps-addr{font-size:11px;color:#fff;line-height:1.35;margin-top:2px;}
.ps-ts{font-size:9px;color:rgba(255,255,255,0.5);margin-top:2px;}

.act-row{display:flex;gap:8px;}
.act-btn{
  flex:1;padding:12px 8px;
  border-radius:10px;
  border:0.5px solid #2a2a2a;
  background:#1a1a1a;
  color:#ccc;font-size:13px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  min-height:46px;
  transition:background 0.12s;
}
.act-btn:active{background:#2a2a2a;transform:scale(0.97);}
.act-btn i{font-size:18px;}
.act-btn.wa{background:#16532d;color:#4ade80;border-color:#1a6335;}
.act-btn.wa:active{background:#1a6335;}
</style>

<div id="app">
  <div id="topbar">
    <div class="tb-item">
      <div class="gps-dot searching" id="gps-dot"></div>
      <span id="gps-lbl" style="font-size:11px">Mencari GPS...</span>
    </div>
    <div class="tb-item" style="font-size:11px;color:#555" id="acc-lbl">—</div>
    <div class="tb-item" style="font-size:11px;color:#888" id="clock">--:--</div>
  </div>

  <div id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <div id="no-cam">
      <i class="ti ti-camera-off" aria-hidden="true"></i>
      <span style="color:#555">Tekan tombol kamera<br>untuk memulai</span>
    </div>
    <canvas id="grid-canvas"></canvas>
    <div id="geo-bar">
      <div class="geo-coords" id="live-coords">Menunggu GPS...</div>
      <div class="geo-addr" id="live-addr">Mengambil lokasi...</div>
      <div class="geo-ts" id="live-ts"></div>
    </div>
  </div>

  <div id="controls">
    <div class="mode-row">
      <button class="mode-btn active" data-mode="photo">Foto</button>
      <button class="mode-btn" data-mode="wide">Lebar 16:9</button>
      <button class="mode-btn" data-mode="square">Kotak 1:1</button>
    </div>
    <div class="ctrl-row">
      <button class="ic-btn" id="btn-flash" aria-label="Flash">
        <i class="ti ti-bolt" aria-hidden="true"></i>
      </button>
      <button class="ic-btn" id="btn-cam" aria-label="Buka kamera">
        <i class="ti ti-camera" aria-hidden="true"></i>
      </button>
      <button id="shutter" aria-label="Ambil foto" disabled></button>
      <button class="ic-btn" id="btn-flip" aria-label="Ganti kamera">
        <i class="ti ti-camera-rotate" aria-hidden="true"></i>
      </button>
      <button class="ic-btn" id="btn-grid" aria-label="Grid">
        <i class="ti ti-grid-dots" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <div id="statusbar">Izinkan akses kamera &amp; lokasi untuk memulai</div>

  <div id="preview-wrap">
    <div class="prev-lbl">HASIL FOTO</div>
    <div id="prev-frame">
      <img id="prev-img" alt="Preview foto">
      <div id="prev-stamp">
        <div class="ps-brand">GeoCamera Pro</div>
        <div class="ps-coord" id="ps-coord"></div>
        <div class="ps-addr" id="ps-addr"></div>
        <div class="ps-ts" id="ps-ts"></div>
      </div>
    </div>
    <div class="act-row">
      <button class="act-btn" id="btn-save"><i class="ti ti-download" aria-hidden="true"></i> Simpan</button>
      <button class="act-btn wa" id="btn-wa"><i class="ti ti-brand-whatsapp" aria-hidden="true"></i> WhatsApp</button>
    </div>
    <div class="act-row">
      <button class="act-btn" id="btn-retake"><i class="ti ti-refresh" aria-hidden="true"></i> Foto ulang</button>
      <button class="act-btn" id="btn-copy"><i class="ti ti-copy" aria-hidden="true"></i> Salin lokasi</button>
    </div>
  </div>
</div>

<canvas id="final-canvas" style="display:none"></canvas>

<script>
const $ = id => document.getElementById(id);
let stream=null, facingMode='environment', geo=null, lastPhoto=null;
let flashOn=false, gridOn=false, mode='photo', camReady=false;

function tick(){
  const n=new Date();
  $('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick,15000);

function setStatus(t){$('statusbar').textContent=t;}

function setViewfinderHeight(){
  const app=$('app');
  const topbar=$('topbar');
  const ctrl=$('controls');
  const sb=$('statusbar');
  const pw=$('preview-wrap');
  const avail=window.innerHeight - topbar.offsetHeight - ctrl.offsetHeight - sb.offsetHeight - (pw.classList.contains('show')?pw.offsetHeight:0);
  $('viewfinder').style.height = Math.max(avail, 180)+'px';
}
window.addEventListener('resize', setViewfinderHeight);
setTimeout(setViewfinderHeight, 100);

async function reverseGeo(lat,lon){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=id&addressdetails=1`,{headers:{'User-Agent':'GeoCamera/1.0'}});
    const d=await r.json();
    if(!d||d.error)return null;
    const a=d.address||{};
    const p=[];
    const road=a.road||a.pedestrian||a.footway||a.path;
    if(road)p.push(road+(a.house_number?' No.'+a.house_number:''));
    if(a.suburb||a.neighbourhood||a.village)p.push(a.suburb||a.neighbourhood||a.village);
    if(a.city_district||a.county)p.push(a.city_district||a.county);
    if(a.city||a.town||a.municipality)p.push(a.city||a.town||a.municipality);
    if(a.state)p.push(a.state);
    return p.filter(Boolean).join(', ')||d.display_name.split(',').slice(0,4).join(',');
  }catch(e){return null;}
}

function startGeo(){
  if(!navigator.geolocation){
    $('gps-dot').className='gps-dot error';
    $('gps-lbl').textContent='GPS N/A';
    $('live-coords').textContent='GPS tidak tersedia';
    $('live-addr').textContent='Perangkat tidak mendukung GPS';
    return;
  }
  navigator.geolocation.watchPosition(async pos=>{
    const {latitude:lat,longitude:lon,accuracy:acc}=pos.coords;
    const now=new Date();
    const ts=now.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})+' '+now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    $('gps-dot').className='gps-dot';
    $('gps-lbl').textContent='GPS Aktif';
    $('live-coords').textContent=lat.toFixed(6)+', '+lon.toFixed(6);
    $('live-ts').textContent=ts;
    $('acc-lbl').textContent='±'+Math.round(acc)+'m';
    if(!geo||Math.abs(lat-(geo.lat||0))>0.00005||Math.abs(lon-(geo.lon||0))>0.00005){
      $('live-addr').textContent='Memuat alamat...';
      const addr=await reverseGeo(lat,lon);
      $('live-addr').textContent=addr||lat.toFixed(5)+', '+lon.toFixed(5);
      geo={lat,lon,acc,address:addr||lat.toFixed(5)+', '+lon.toFixed(5),ts};
    }else{geo.ts=ts;}
  },err=>{
    $('gps-dot').className='gps-dot error';
    const msg=err.code===1?'Izin GPS ditolak':err.code===2?'Sinyal lemah':'GPS timeout';
    $('gps-lbl').textContent=msg;
    $('live-coords').textContent=msg;
    $('live-addr').textContent='Aktifkan GPS di pengaturan';
    geo={lat:null,lon:null,acc:null,address:'Lokasi tidak tersedia',ts:new Date().toLocaleString('id-ID')};
  },{enableHighAccuracy:true,timeout:15000,maximumAge:5000});
}
startGeo();

async function startCamera(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1920},height:{ideal:1440}},audio:false});
    $('video').srcObject=stream;
    $('video').style.display='block';
    $('no-cam').style.display='none';
    $('shutter').disabled=false;
    camReady=true;
    setStatus('Kamera aktif — siap memotret');
    $('btn-cam').innerHTML='<i class="ti ti-camera-check" aria-hidden="true"></i>';
    $('btn-cam').classList.add('cam-on');
    if(gridOn)drawGrid();
    setViewfinderHeight();
  }catch(e){
    setStatus('Gagal akses kamera: '+e.message);
    $('video').style.display='none';
    $('no-cam').style.display='flex';
  }
}

$('btn-cam').addEventListener('click',startCamera);

$('btn-flip').addEventListener('click',()=>{
  facingMode=facingMode==='environment'?'user':'environment';
  if(camReady)startCamera();
  setStatus(facingMode==='user'?'Kamera depan aktif':'Kamera belakang aktif');
});

$('btn-flash').addEventListener('click',()=>{
  flashOn=!flashOn;
  $('btn-flash').classList.toggle('on',flashOn);
  setStatus(flashOn?'Flash ON':'Flash OFF');
  if(stream){
    const t=stream.getVideoTracks()[0];
    if(t&&t.getCapabilities&&t.getCapabilities().torch)t.applyConstraints({advanced:[{torch:flashOn}]});
  }
});

$('btn-grid').addEventListener('click',()=>{
  gridOn=!gridOn;
  $('btn-grid').classList.toggle('on',gridOn);
  if(gridOn)drawGrid();else{$('grid-canvas').style.display='none';}
});

function drawGrid(){
  const c=$('grid-canvas'),vf=$('viewfinder');
  c.width=vf.offsetWidth;c.height=vf.offsetHeight;
  c.style.display='block';
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.7;
  [1/3,2/3].forEach(f=>{
    ctx.beginPath();ctx.moveTo(c.width*f,0);ctx.lineTo(c.width*f,c.height);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,c.height*f);ctx.lineTo(c.width,c.height*f);ctx.stroke();
  });
}

document.querySelectorAll('.mode-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');mode=b.dataset.mode;
  });
});

$('shutter').addEventListener('click',takePhoto);

function wrapText(ctx,text,maxW){
  const words=text.split(' ');const lines=[];let line='';
  for(const w of words){
    const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;
  }
  if(line)lines.push(line);
  return lines.slice(0,3);
}

async function takePhoto(){
  if(!camReady||!stream)return;
  const sh=$('shutter');
  sh.classList.add('snap');setTimeout(()=>sh.classList.remove('snap'),150);
  const vid=$('video');
  const fc=$('final-canvas');
  const vw=vid.videoWidth||1280,vh=vid.videoHeight||960;
  let cw=vw,ch=vh;
  if(mode==='square'){cw=Math.min(vw,vh);ch=cw;}
  else if(mode==='wide'){ch=Math.round(vw*9/16);}
  fc.width=cw;fc.height=ch;
  const ctx=fc.getContext('2d');
  ctx.drawImage(vid,(vw-cw)/2,(vh-ch)/2,cw,ch,0,0,cw,ch);

  const g=geo||{};
  const lat=g.lat?g.lat.toFixed(6):'—';
  const lon=g.lon?g.lon.toFixed(6):'—';
  const addr=g.address||'Lokasi tidak tersedia';
  const ts=g.ts||new Date().toLocaleString('id-ID');
  const accStr=g.acc?'  ±'+Math.round(g.acc)+'m':'';

  const scale=cw/380;
  const p=Math.round(10*scale);
  const lh=Math.round(15*scale);
  const stampH=Math.round(ch*0.25);
  const grad=ctx.createLinearGradient(0,ch-stampH,0,ch);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(0.4,'rgba(0,0,0,0.72)');
  grad.addColorStop(1,'rgba(0,0,0,0.9)');
  ctx.fillStyle=grad;ctx.fillRect(0,ch-stampH,cw,stampH);

  ctx.textBaseline='bottom';
  let y=ch-p;
  ctx.font=`${Math.round(9*scale)}px monospace`;ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.fillText(ts+accStr,p,y);y-=lh+1;
  ctx.font=`${Math.round(11*scale)}px sans-serif`;ctx.fillStyle='#fff';
  const lines=wrapText(ctx,addr,cw-p*2);
  for(let i=lines.length-1;i>=0;i--){ctx.fillText(lines[i],p,y);y-=lh;}
  ctx.font=`${Math.round(10*scale)}px monospace`;ctx.fillStyle='#a3e635';
  ctx.fillText(lat+', '+lon,p,y);y-=lh;
  ctx.font=`${Math.round(9*scale)}px sans-serif`;ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText('GeoCamera Pro',p,y);

  const url=fc.toDataURL('image/jpeg',0.93);
  lastPhoto={url,lat,lon,address:addr,ts};

  $('prev-img').src=url;
  $('ps-coord').textContent=lat+', '+lon;
  $('ps-addr').textContent=addr;
  $('ps-ts').textContent=ts;
  $('preview-wrap').classList.add('show');
  setTimeout(()=>{$('preview-wrap').scrollIntoView({behavior:'smooth',block:'nearest'});},100);
  setTimeout(setViewfinderHeight,200);
  setStatus('Foto berhasil diambil dengan geotag!');
}

$('btn-retake').addEventListener('click',()=>{
  $('preview-wrap').classList.remove('show');
  lastPhoto=null;
  setTimeout(setViewfinderHeight,100);
  setStatus('Siap memotret lagi');
});

$('btn-save').addEventListener('click',()=>{
  if(!lastPhoto)return;
  const a=document.createElement('a');
  a.href=lastPhoto.url;
  a.download='geocam_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.jpg';
  a.click();
  setStatus('Foto tersimpan!');
});

$('btn-wa').addEventListener('click',async()=>{
  if(!lastPhoto)return;
  const msg=`📍 *GeoCamera Pro*\n\n📌 Koordinat: ${lastPhoto.lat}, ${lastPhoto.lon}\n🏠 Alamat: ${lastPhoto.address}\n🕐 Waktu: ${lastPhoto.ts}`;
  try{
    const res=await fetch(lastPhoto.url);
    const blob=await res.blob();
    const file=new File([blob],'geophoto.jpg',{type:'image/jpeg'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'GeoCamera Photo',text:msg});
      setStatus('Berhasil dibagikan!');return;
    }
  }catch(e){}
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
  setStatus('Membuka WhatsApp...');
});

$('btn-copy').addEventListener('click',()=>{
  if(!lastPhoto)return;
  const t=lastPhoto.lat+', '+lastPhoto.lon+' — '+lastPhoto.address;
  navigator.clipboard&&navigator.clipboard.writeText(t).then(()=>setStatus('Koordinat disalin!'));
});
</script>
